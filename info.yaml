pinout:
  # Inputs
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "data_in[7]"

  # Outputs
  uo[0]: "status/data_out[0]"
  uo[1]: "status/data_out[1]"
  uo[2]: "status/data_out[2]"
  uo[3]: "status/data_out[3]"
  uo[4]: "status/data_out[4]"
  uo[5]: "status/data_out[5]"
  uo[6]: "status/data_out[6]"
  uo[7]: "status/data_out[7]"

  # Bidirectional pins
  uio[0]: "slot_sel[0]"
  uio[1]: "slot_sel[1]"
  uio[2]: "feature_idx[0]"
  uio[3]: "feature_idx[1]"
  uio[4]: "feature_idx[2]"
  uio[5]: "cmd[0]"
  uio[6]: "cmd[1]"
  uio[7]: "strobe"

